name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  verify:
    name: Typecheck & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agenttrace
          POSTGRES_PASSWORD: agenttrace
          POSTGRES_DB: agenttrace
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agenttrace -d agenttrace"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql://agenttrace:agenttrace@localhost:5432/agenttrace?schema=public"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Apply schema
        run: pnpm prisma db push --skip-generate

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm --filter @agenttrace/api test

  build-dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @agenttrace/dashboard build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
